name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        run: go build -o puddle .
      - uses: actions/upload-artifact@v4
        with:
          name: puddle
          path: puddle

  # ── Non-matrix CLI tests ──────────────────────────────────────────
  cli:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: puddle
      - run: chmod +x puddle

      - name: puddle list
        run: |
          ./puddle list
          ./puddle list | grep -q python

      - name: puddle run -c (SQL command)
        run: |
          ./puddle run python -c "SELECT 42 AS ok;" | tee /tmp/sql.txt
          grep -q "42" /tmp/sql.txt

      - name: puddle run (shell mode)
        run: |
          echo "pwd && ls && exit" | ./puddle run python 2>&1 | tee /tmp/shell.txt
          grep -q "/work" /tmp/shell.txt

      - name: puddle shell
        run: |
          echo "echo hello && exit" | ./puddle shell python 2>&1 | tee /tmp/shell2.txt
          grep -q "hello" /tmp/shell2.txt

      - name: puddle run --repl
        run: |
          ./puddle run python --repl -c "SELECT 'repl' AS mode;" | tee /tmp/repl.txt
          grep -q "repl" /tmp/repl.txt

      - name: puddle use --global + show
        run: |
          # set global default
          ./puddle use python --global -d 1.3.0 -r 3.11
          ./puddle show | grep -q "python"
          ./puddle show | grep -q "1.3.0"
          ./puddle show | grep -q "3.11"
          ./puddle show | grep -q "global"

          # run without language arg picks up global config
          ./puddle run -c "SELECT version();" | tee /tmp/use.txt
          grep -q "1.3.0" /tmp/use.txt

          # clear global config
          ./puddle use --clear
          ./puddle show | grep -q "No puddle configuration"

      - name: puddle use session (subshell)
        run: |
          # session subshell: puddle show works inside it
          echo './puddle show > /tmp/session_show.txt; exit' | ./puddle use python -d 1.3.0 -r 3.11 2>/dev/null
          grep -q "python" /tmp/session_show.txt
          grep -q "1.3.0" /tmp/session_show.txt
          grep -q "session" /tmp/session_show.txt

          # unnamed session file is cleaned up after exit
          ls ~/.config/puddle/sessions/ 2>/dev/null | grep -qv . || true

      - name: puddle use --name (named session)
        run: |
          echo 'exit' | ./puddle use python --name testenv -d 1.4.4 2>/dev/null
          # named session file persists
          test -f ~/.config/puddle/sessions/testenv.json
          grep -q "1.4.4" ~/.config/puddle/sessions/testenv.json

      - name: puddle clean
        run: |
          # Should have images from previous steps
          ./puddle clean
          # Verify no puddle images remain
          ! docker images | grep "puddle-"

      - name: puddle clean --sessions
        run: |
          ./puddle clean --sessions

      - name: puddle run --native (Python)
        run: |
          pip install duckdb
          ./puddle run python --native -c "SELECT 'native' AS mode;" | tee /tmp/native.txt
          grep -q "native" /tmp/native.txt

  # ── Matrix: Docker build + SELECT 1 ──────────────────────────────
  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runtime: [  # same matrix as publish-images.yml
          { lang: python, version: "3.11" }, { lang: python, version: "3.12" }, { lang: python, version: "3.13" },
          { lang: java, version: "17" }, { lang: java, version: "21" },
          { lang: node, version: "18" }, { lang: node, version: "20" }, { lang: node, version: "22" },
          { lang: go, version: "1.24" },
          { lang: php, version: "8.2" }, { lang: php, version: "8.3" },
          { lang: ruby, version: "3.2" }, { lang: ruby, version: "3.3" }
        ]
        duckdb: ["1.2.0", "1.3.0", "1.4.4"]
        exclude:
          # satur.io/duckdb v2.x requires PHP >= 8.3; v1.x bundles its own DuckDB version
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.3.0"
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.4.4"
    name: ${{ matrix.runtime.lang }} / duckdb ${{ matrix.duckdb }} / runtime ${{ matrix.runtime.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: puddle
      - run: chmod +x puddle
      - name: "SELECT 1"
        run: |
          ./puddle run ${{ matrix.runtime.lang }} -d ${{ matrix.duckdb }} -r ${{ matrix.runtime.version }} --build -c "SELECT 1 AS ok;" > /tmp/output.txt
          cat /tmp/output.txt
          grep -q "ok" /tmp/output.txt
