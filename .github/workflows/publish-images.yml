name: Publish Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Base: every language × 3 DuckDB versions (default runtimes).
        lang: [python, java, node, go, rust, php, ruby]
        duckdb: ["1.2.0", "1.3.0", "1.4.4"]
        include:
          # ── Python runtimes ──
          - { lang: python, duckdb: "1.4.4", runtime: "3.10" }
          - { lang: python, duckdb: "1.4.4", runtime: "3.12" }
          - { lang: python, duckdb: "1.4.4", runtime: "3.13" }
          # ── Java runtimes ──
          - { lang: java, duckdb: "1.4.4", runtime: "17" }
          - { lang: java, duckdb: "1.4.4", runtime: "21" }
          # ── Node runtimes ──
          - { lang: node, duckdb: "1.4.4", runtime: "18" }
          - { lang: node, duckdb: "1.4.4", runtime: "20" }
          - { lang: node, duckdb: "1.4.4", runtime: "22" }
          # ── Go runtimes ──
          - { lang: go, duckdb: "1.4.4", runtime: "1.22" }
          - { lang: go, duckdb: "1.4.4", runtime: "1.24" }
          # ── PHP runtimes ──
          - { lang: php, duckdb: "1.4.4", runtime: "8.2" }
          - { lang: php, duckdb: "1.4.4", runtime: "8.3" }
          # ── Ruby runtimes ──
          - { lang: ruby, duckdb: "1.4.4", runtime: "3.2" }
          - { lang: ruby, duckdb: "1.4.4", runtime: "3.3" }
    name: ${{ matrix.lang }} / duckdb ${{ matrix.duckdb }}${{ matrix.runtime && format(' / runtime {0}', matrix.runtime) || '' }}
    env:
      # Map language to its runtime version build-arg name.
      RUNTIME_ARG_python: PYTHON_VERSION
      RUNTIME_ARG_java: JAVA_VERSION
      RUNTIME_ARG_node: NODE_VERSION
      RUNTIME_ARG_go: GO_VERSION
      RUNTIME_ARG_rust: RUST_VERSION
      RUNTIME_ARG_php: PHP_VERSION
      RUNTIME_ARG_ruby: RUBY_VERSION
      # Default runtimes per language (used when matrix.runtime is empty).
      DEFAULT_RT_python: "3.12"
      DEFAULT_RT_java: "21"
      DEFAULT_RT_node: "20"
      DEFAULT_RT_go: "1.24"
      DEFAULT_RT_rust: "1"
      DEFAULT_RT_php: "8.3"
      DEFAULT_RT_ruby: "3"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve runtime version
        id: rt
        run: |
          RT="${{ matrix.runtime }}"
          if [ -z "$RT" ]; then
            RT="${{ env[format('DEFAULT_RT_{0}', matrix.lang)] }}"
          fi
          echo "version=$RT" >> "$GITHUB_OUTPUT"

      - name: Resolve runtime build-arg name
        id: arg
        run: |
          echo "name=${{ env[format('RUNTIME_ARG_{0}', matrix.lang)] }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dockerfiles/${{ matrix.lang }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/donnype/puddle-${{ matrix.lang }}:${{ matrix.duckdb }}-${{ steps.rt.outputs.version }}
          build-args: |
            DUCKDB_VERSION=${{ matrix.duckdb }}
            ${{ steps.arg.outputs.name }}=${{ steps.rt.outputs.version }}
            ${{ matrix.lang == 'php' && format('DUCKDB_PHP_VERSION=2.0.3') || '' }}
