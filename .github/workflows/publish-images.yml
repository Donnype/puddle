name: Publish Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        lang: [python, java, node, go, php, ruby]  # TODO: fix slow rust builds
        duckdb: ["1.2.0", "1.3.0", "1.4.4"]
        include:
          # ── Python runtimes ──
          - { lang: python, runtime: "3.11" }
          - { lang: python, runtime: "3.12" }
          - { lang: python, runtime: "3.13" }
          # ── Java runtimes ──
          - { lang: java, runtime: "17" }
          - { lang: java, runtime: "21" }
          # ── Node runtimes ──
          - { lang: node, runtime: "18" }
          - { lang: node, runtime: "20" }
          - { lang: node, runtime: "22" }
          # ── Go runtimes ──
          - { lang: go, runtime: "1.22" }
          - { lang: go, runtime: "1.24" }
          # ── PHP runtimes ──
          - { lang: php, runtime: "8.2" }
          - { lang: php, runtime: "8.3" }
          # ── Ruby runtimes ──
          - { lang: ruby, runtime: "3.2" }
          - { lang: ruby, runtime: "3.3" }
    name: ${{ matrix.lang }} / duckdb ${{ matrix.duckdb }}${{ matrix.runtime && format(' / runtime {0}', matrix.runtime) || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve runtime build-arg name
        id: rt
        run: echo "arg=$(echo '${{ matrix.lang }}' | tr '[:lower:]' '[:upper:]')_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dockerfiles/${{ matrix.lang }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/donnype/puddle-${{ matrix.lang }}:${{ matrix.duckdb }}-${{ matrix.runtime }}
          cache-from: type=registry,ref=ghcr.io/donnype/puddle-${{ matrix.lang }}:${{ matrix.duckdb }}-${{ matrix.runtime }}
          cache-to: type=inline
          build-args: |
            DUCKDB_VERSION=${{ matrix.duckdb }}
            ${{ steps.rt.outputs.arg }}=${{ matrix.runtime }}
            ${{ matrix.lang == 'php' && format('DUCKDB_PHP_VERSION=2.0.3') || '' }}
