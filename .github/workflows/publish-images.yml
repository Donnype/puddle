name: Publish Images

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-images.yml
      - cmd/image.go
      - dockerfiles/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runtime: [  # TODO: fix slow rust builds
          { lang: python, version: "3.11" }, { lang: python, version: "3.12" }, { lang: python, version: "3.13" },
          { lang: java, version: "17" }, { lang: java, version: "21" },
          { lang: node, version: "18" }, { lang: node, version: "20" }, { lang: node, version: "22" },
          { lang: go, version: "1.24" },
          { lang: php, version: "8.2" }, { lang: php, version: "8.3" },
          { lang: ruby, version: "3.2" }, { lang: ruby, version: "3.3" }
        ]
        duckdb: ["1.2.0", "1.2.1", "1.2.2", "1.3.0",  "1.3.1",  "1.3.2", "1.4.0", "1.4.1", "1.4.2", "1.4.3", "1.4.4"]
        exclude:
          # @duckdb/node-api has no npm releases for these DuckDB patch versions
          - runtime: { lang: node, version: "18" }
            duckdb: "1.2.1"
          - runtime: { lang: node, version: "18" }
            duckdb: "1.2.2"
          - runtime: { lang: node, version: "18" }
            duckdb: "1.3.1"
          - runtime: { lang: node, version: "18" }
            duckdb: "1.3.2"
          - runtime: { lang: node, version: "18" }
            duckdb: "1.4.2"
          - runtime: { lang: node, version: "20" }
            duckdb: "1.2.1"
          - runtime: { lang: node, version: "20" }
            duckdb: "1.2.2"
          - runtime: { lang: node, version: "20" }
            duckdb: "1.3.1"
          - runtime: { lang: node, version: "20" }
            duckdb: "1.3.2"
          - runtime: { lang: node, version: "20" }
            duckdb: "1.4.2"
          - runtime: { lang: node, version: "22" }
            duckdb: "1.2.1"
          - runtime: { lang: node, version: "22" }
            duckdb: "1.2.2"
          - runtime: { lang: node, version: "22" }
            duckdb: "1.3.1"
          - runtime: { lang: node, version: "22" }
            duckdb: "1.3.2"
          - runtime: { lang: node, version: "22" }
            duckdb: "1.4.2"
          # satur.io/duckdb v2.x requires PHP >= 8.3; v1.x bundles its own DuckDB version
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.3.0"
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.3.1"
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.3.2"
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.4.0"
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.4.1"
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.4.2"
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.4.3"
          - runtime: { lang: php, version: "8.2" }
            duckdb: "1.4.4"
    name: ${{ matrix.runtime.lang }} / duckdb ${{ matrix.duckdb }}${{ matrix.runtime.version && format(' / runtime {0}', matrix.runtime.version) || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve runtime build-arg name
        id: rt
        run: echo "arg=$(echo '${{ matrix.runtime.lang }}' | tr '[:lower:]' '[:upper:]')_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dockerfiles/${{ matrix.runtime.lang }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/donnype/puddle-${{ matrix.runtime.lang }}:${{ matrix.duckdb }}-${{ matrix.runtime.version }}
          cache-from: type=registry,ref=ghcr.io/donnype/puddle-${{ matrix.runtime.lang }}:${{ matrix.duckdb }}-${{ matrix.runtime.version }}
          cache-to: type=inline
          build-args: |
            DUCKDB_VERSION=${{ matrix.duckdb }}
            ${{ steps.rt.outputs.arg }}=${{ matrix.runtime.version }}
            ${{ matrix.runtime.lang == 'php' && format('DUCKDB_PHP_VERSION=2.0.3') || '' }}
